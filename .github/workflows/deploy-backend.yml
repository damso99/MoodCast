name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build backend jar
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "backend/target/moodcast-backend-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu"
          strip_components: 2

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mv /home/ubuntu/moodcast-backend-0.0.1-SNAPSHOT.jar /home/ubuntu/moodcast-backend.jar
            sudo systemctl daemon-reload
            sudo systemctl restart moodcast-backend
            sudo systemctl status moodcast-backend --no-pager
