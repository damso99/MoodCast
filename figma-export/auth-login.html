<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodCast - 로그인</title>
  <style>
    :root{
      --bg:#f8f7ff;
      --surface:rgba(255,255,255,.96);
      --line:#e4e0f3;
      --text:#15142b;
      --text-2:#5f6377;
      --text-3:#8f94a7;
      --brand:#6e55ff;
      --brand-soft:#ebe4ff;
      --shadow:0 18px 40px rgba(61,52,120,.08),0 2px 10px rgba(61,52,120,.04);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-width:1440px;
      min-height:100%;
      font-family:Inter,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(138,99,255,.18), transparent 18%),
        radial-gradient(circle at top right, rgba(107,183,255,.12), transparent 18%),
        var(--bg);
    }
    .canvas{width:1440px;min-height:1024px;margin:0 auto;padding:24px;display:grid;place-items:center}
    .card{
      width:500px;
      padding:32px 36px 30px;
      border:1px solid var(--line);
      border-radius:28px;
      background:var(--surface);
      box-shadow:var(--shadow);
      display:grid;
      gap:16px;
    }
    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#171331;
      font-size:16px;
      font-weight:900;
    }
    .logo{width:38px;height:38px}
    .title{margin:0;text-align:center;font-size:26px;font-weight:900;letter-spacing:-.03em}
    .subtitle{margin:0;text-align:center;color:var(--text-2);font-size:14px;font-weight:700}
    .field{display:grid;gap:8px}
    .label{color:#2b2841;font-size:14px;font-weight:900}
    .label b{color:#ff5270}
    .input{
      width:100%;
      height:50px;
      padding:0 18px;
      border:1px solid #dfe4ef;
      border-radius:16px;
      background:#fbfcff;
      color:#25304c;
      font-size:15px;
      font-weight:600;
      outline:none;
    }
    .input::placeholder{color:#b6bbca}
    .options{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:2px;
    }
    .check{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#1e2236;
      font-size:14px;
      font-weight:800;
      white-space:nowrap;
    }
    .check input{width:18px;height:18px;accent-color:var(--brand)}
    .links{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--brand);
      font-size:14px;
      font-weight:800;
    }
    .links span{color:#c6c8d4}
    .button{
      min-height:48px;
      border:0;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      font-weight:900;
      color:#fff;
      background:linear-gradient(135deg,#4da6ff 0%,#7c4dff 50%,#ec24c7 100%);
      box-shadow:0 16px 28px rgba(124,77,255,.22);
    }
    .divider{
      display:grid;
      grid-template-columns:minmax(24px,1fr) auto minmax(24px,1fr);
      align-items:center;
      gap:14px;
      color:#a3a8b7;
      font-size:13px;
      font-weight:700;
    }
    .divider span{height:1px;background:#eceef4}
    .social{display:grid;gap:10px}
    .social-button{
      min-height:50px;
      border-radius:16px;
      border:1px solid #e1e4ec;
      background:#fff;
      color:#3d3658;
      font-size:15px;
      font-weight:900;
      box-shadow:0 10px 22px rgba(35,22,84,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }
    .social-button.kakao{border-color:#fee84c;background:#fee84c;color:#191919}
    .social-button.naver{border-color:#05c75a;background:#05c75a;color:#fff}
    .mark{font-size:16px;font-weight:1000;line-height:1}
    .footer{text-align:center;color:#9aa0af;font-size:14px;font-weight:800}
    .footer a{color:var(--brand);text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <div class="canvas">
    <section class="card">
      <div class="brand">
        <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
          <path d="M4 25h8l4-6 4 12 6-18 4 12h14" fill="none" stroke="#6e55ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 28h8l4-4 4 8 6-12 4 8h14" fill="none" stroke="#69c1ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/>
          <circle cx="24" cy="24" r="2" fill="#d5d8df"/>
        </svg>
        <span>MoodCast</span>
      </div>
      <div>
        <h1 class="title">로그인</h1>
        <p class="subtitle">MoodCast에 오신 것을 환영합니다</p>
      </div>
      <div class="field">
        <div class="label">이메일 <b>*</b></div>
        <input class="input" type="email" placeholder="이메일 주소를 입력하세요" />
      </div>
      <div class="field">
        <div class="label">비밀번호 <b>*</b></div>
        <input class="input" type="password" placeholder="비밀번호를 입력하세요" />
      </div>
      <div class="options">
        <label class="check"><input type="checkbox" />로그인 상태 유지</label>
        <label class="check"><input type="checkbox" />아이디 저장</label>
      </div>
      <div class="options">
        <div class="links"><a href="#">아이디 찾기</a><span>|</span><a href="#">비밀번호 찾기</a></div>
      </div>
      <button class="button" type="button">로그인</button>
      <div class="divider"><span></span><em>또는 소셜 계정으로 로그인</em><span></span></div>
      <div class="social">
        <button class="social-button kakao" type="button"><span class="mark">◼</span>카카오로 로그인</button>
        <button class="social-button naver" type="button"><span class="mark">N</span>네이버로 로그인</button>
        <button class="social-button" type="button"><span class="mark" style="color:#4c89ff">G</span>Google로 로그인</button>
      </div>
      <p class="footer">아직 회원이 아니신가요? <a href="#">회원가입</a></p>
    </section>
  </div>
</body>
</html>
