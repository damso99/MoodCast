<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodCast - 회원가입</title>
  <style>
    :root{--bg:#f8f7ff;--surface:rgba(255,255,255,.96);--line:#e4e0f3;--text:#15142b;--text-2:#5f6377;--text-3:#8f94a7;--brand:#6e55ff;--brand-soft:#ebe4ff;--shadow:0 18px 40px rgba(61,52,120,.08),0 2px 10px rgba(61,52,120,.04)}
    *{box-sizing:border-box}
    html,body{margin:0;min-width:1440px;min-height:100%;font-family:Inter,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(138,99,255,.18), transparent 18%),radial-gradient(circle at top right, rgba(107,183,255,.12), transparent 18%),var(--bg)}
    .canvas{width:1440px;min-height:1024px;margin:0 auto;padding:24px;display:grid;place-items:center}
    .card{width:560px;border:1px solid var(--line);border-radius:30px;background:var(--surface);box-shadow:var(--shadow);padding:32px 34px 28px;display:grid;gap:16px}
    .brand{display:flex;align-items:center;justify-content:center;gap:12px}
    .logo{width:38px;height:38px}
    .brand h1{margin:0;font-size:18px;font-weight:900}
    .title{margin:0;font-size:26px;font-weight:900;text-align:center;letter-spacing:-.03em}
    .desc{margin:0;color:var(--text-2);font-size:14px;line-height:1.7;text-align:center;font-weight:600}
    .tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:6px;border-radius:18px;background:#f5f2ff}
    .tab{min-height:42px;border-radius:12px;display:grid;place-items:center;font-size:13px;font-weight:800;color:#726985}
    .tab.active{background:var(--brand);color:#fff}
    .steps{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .step{border:1px solid var(--line);border-radius:22px;background:#fff;padding:16px}
    .step-num{width:26px;height:26px;border-radius:999px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:13px;font-weight:900;margin-bottom:8px}
    .step:nth-child(2) .step-num{background:#d8dfea;color:#8f94a7}
    .step-title{margin:0 0 6px;font-size:14px;font-weight:900}
    .step-text{margin:0;color:var(--text-2);font-size:12px;line-height:1.6;font-weight:600}
    .section{display:grid;gap:12px}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .label{color:#2d2940;font-size:12px;font-weight:800;margin-bottom:6px}
    .field{min-height:52px;padding:0 16px;border:1px solid var(--line);border-radius:16px;background:#fbfaff;display:flex;align-items:center;color:#a39db8;font-size:13px;font-weight:600}
    .field-row{display:grid;grid-template-columns:minmax(0,1fr) 120px;gap:12px}
    .button{min-height:48px;border:0;border-radius:18px;background:linear-gradient(135deg,#7da9ff,#8b6bff 45%,#ec7bd8);color:#fff;font-size:14px;font-weight:800}
    .button.secondary{background:#f4efff;color:#6c49ff;border:1px solid #ddd0ff}
    .social{display:grid;gap:10px}
    .social-btn{min-height:48px;border:1px solid var(--line);border-radius:18px;background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;color:#2d2940;font-size:14px;font-weight:800}
    .social-icon{width:18px;height:18px;border-radius:50%}
    .footer{margin:0;color:var(--text-3);font-size:12px;line-height:1.6;text-align:center;font-weight:600}
    .footer a{color:var(--brand);text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <div class="canvas">
    <section class="card">
      <div class="brand">
        <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
          <path d="M4 25h8l4-6 4 12 6-18 4 12h14" fill="none" stroke="#6e55ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 28h8l4-4 4 8 6-12 4 8h14" fill="none" stroke="#69c1ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/>
          <circle cx="24" cy="24" r="2" fill="#d5d8df"/>
        </svg>
        <h1>MoodCast</h1>
      </div>
      <div>
        <h2 class="title">회원가입</h2>
        <p class="desc">MoodCast에서 당신의 감정을 공유하세요</p>
      </div>
      <div class="tabs">
        <div class="tab active">1 기본 정보</div>
        <div class="tab">2 약관 동의</div>
      </div>
      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <p class="step-title">기본 정보</p>
          <p class="step-text">이름, 닉네임, 이메일, 비밀번호를 입력합니다.</p>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <p class="step-title">약관 동의</p>
          <p class="step-text">이용약관, 개인정보 처리방침, 마케팅 수신 동의를 확인합니다.</p>
        </div>
      </div>
      <div class="section">
        <div class="grid-2">
          <div><div class="label">이름 *</div><div class="field">실명을 입력하세요</div></div>
          <div><div class="label">닉네임</div><div class="field">닉네임 입력</div></div>
        </div>
        <div class="grid-2">
          <div><div class="label">이메일 *</div><div class="field">이메일 주소를 입력하세요</div></div>
          <div>
            <div class="label">이메일 인증 코드</div>
            <div class="field-row">
              <div class="field">6자리 코드 입력</div>
              <button class="button secondary" type="button">인증 요청</button>
            </div>
          </div>
        </div>
        <div class="grid-2">
          <div><div class="label">비밀번호 *</div><div class="field">8자 이상</div></div>
          <div><div class="label">비밀번호 확인 *</div><div class="field">다시 입력</div></div>
        </div>
        <button class="button" type="button">다음 단계</button>
      </div>
      <div style="height:1px;background:#ede8f8"></div>
      <div class="social">
        <div style="text-align:center;color:#a3a8b7;font-size:13px;font-weight:700">또는 소셜로 간편가입</div>
        <button class="social-btn" type="button"><span class="social-icon" style="background:#fee84c"></span></button>
        <div style="display:flex;gap:12px;justify-content:center">
          <button class="social-btn" type="button" style="width:44px;height:44px;border-radius:50%;padding:0"><span class="social-icon" style="background:#fff;border:1px solid #e1e4ec;display:grid;place-items:center;color:#4c89ff;font-size:15px;font-weight:900">G</span></button>
          <button class="social-btn" type="button" style="width:44px;height:44px;border-radius:50%;padding:0;background:#05c75a;border-color:#05c75a"><span class="social-icon" style="background:transparent;display:grid;place-items:center;color:#fff;font-size:15px;font-weight:900">N</span></button>
        </div>
      </div>
      <p class="footer">이미 계정이 있으신가요? <a href="#">로그인</a></p>
    </section>
  </div>
</body>
</html>
